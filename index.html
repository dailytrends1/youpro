<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Clothing Program</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

.card{
background:white;
width:100%;
max-width:400px;
padding:30px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
text-align:center;
}

h1{
font-size:24px;
margin-bottom:10px;
}

p{
color:#666;
margin-bottom:25px;
}

.options{
display:flex;
gap:10px;
margin-bottom:20px;
}

.option{
flex:1;
padding:15px;
border:2px solid #ddd;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.option.selected{
background:#4CAF50;
color:white;
border-color:#4CAF50;
}

button{
width:100%;
padding:15px;
background:#000;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}
</style>
</head>
<body>

<div class="card">

<h1>👕 Free Clothing Program</h1>

<p>Are you currently living in Nigeria?</p>

<div class="options">
<div class="option" onclick="selectOption(this)">Yes</div>
<div class="option" onclick="selectOption(this)">No</div>
</div>

<button onclick="continueNow()">CONTINUE</button>

</div>

<script>

function selectOption(element){
document.querySelectorAll('.option').forEach(opt=>{
opt.classList.remove('selected');
});
element.classList.add('selected');
}

function continueNow(){
window.location.href = "https://blogs.exbowl.com/get-paid-e25000-to-move-to-germany-with-visa-sponsored-opportunities/";
}

</script>

</body>
</html>

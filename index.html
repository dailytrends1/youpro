<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat Profile</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:linear-gradient(135deg,#dff6ec,#ffffff);

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;

padding:20px;

}

.phone{

width:100%;
max-width:390px;

background:white;

border-radius:30px;

overflow:hidden;

box-shadow:0 20px 50px rgba(0,0,0,.18);

animation:fade .6s ease;

}

.header{

background:#0f9d58;

color:white;

padding:18px;

display:flex;

align-items:center;

gap:15px;

font-size:18px;

font-weight:600;

}

.back{

font-size:24px;

cursor:pointer;

}

.profile{

padding:35px 20px;

text-align:center;

}

.profile img{

width:130px;

height:130px;

border-radius:50%;

object-fit:cover;

border:5px solid #22c55e;

}

.profile h2{

margin-top:18px;

font-size:26px;

color:#222;

}

.online{

display:flex;

justify-content:center;

align-items:center;

gap:8px;

margin-top:10px;

font-weight:600;

color:#22c55e;

}

.dot{

width:12px;

height:12px;

border-radius:50%;

background:#22c55e;

box-shadow:0 0 10px #22c55e;

animation:blink 1s infinite;

}

.country{

margin-top:10px;

color:#777;

font-size:15px;

}

.status{

margin-top:18px;

font-size:15px;

color:#555;

line-height:1.6;

}

.section{

padding:0 20px 25px;

}

.card{

background:#f8f8f8;

border-radius:18px;

padding:18px;

margin-bottom:15px;

}

.label{

font-size:12px;

text-transform:uppercase;

letter-spacing:1px;

color:#888;

margin-bottom:6px;

}

.value{

font-size:15px;

color:#333;

}

.button{

display:block;

margin:20px;

text-decoration:none;

background:#22c55e;

color:white;

text-align:center;

padding:18px;

font-size:18px;

font-weight:600;

border-radius:40px;

transition:.3s;

}

.button:hover{

transform:scale(1.03);

}

.footer{

text-align:center;

padding:15px 20px 25px;

font-size:12px;

color:#888;

}

@keyframes blink{

0%{
opacity:1;
transform:scale(1);
}

50%{
opacity:.2;
transform:scale(.8);
}

100%{
opacity:1;
transform:scale(1);
}

}

@keyframes fade{

from{

opacity:0;

transform:translateY(20px);

}

to{

opacity:1;

transform:translateY(0);

}

}

</style>

</head>

<body>

<div class="phone">

<div class="header">

<div class="back">←</div>

<div>Profile</div>

</div>

<div class="profile">

<img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=900" alt="Profile">

<h2>Emily Johnson</h2>

<div class="online">

<div class="dot"></div>

<span>Online</span>

</div>

<div class="country">
📍 United States 🇺🇸
</div>

<div class="status">
"Life is better when you meet genuine people and share meaningful conversations. ❤️"
</div>

</div>

<div class="section">

<div class="card">

<div class="label">
About
</div>

<div class="value">
Travel ✈️ • Coffee ☕ • Movies 🎬 • Music 🎵
</div>

</div>

<div class="card">

<div class="label">
Age
</div>

<div class="value">
20 Years
</div>

</div>

<div class="card">

<div class="label">
Language
</div>

<div class="value">
English
</div>

</div>

<div class="card">

<div class="label">
Interests
</div>

<div class="value">
Making friends • Traveling • Good conversations
</div>

</div>

</div>

<a href="https://blogs.exbowl.com/get-paid-e25000-to-move-to-germany-with-visa-sponsored-opportunities/" class="button">
Start Chat
</a>

<div class="footer">

</div>

</div>

</body>
</html>
